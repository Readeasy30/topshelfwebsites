<!DOCTYPE html>
<html>
<head>
  <title>TopShelf Websites</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .sub {
      color: #cbd5e1;
      margin-bottom: 30px;
      font-size: 18px;
    }

    .box {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .section {
      margin-top: 40px;
    }

    .pricing {
      display: grid;
      gap: 15px;
      margin-top: 20px;
    }

    .price {
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .cta {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .green {
      background: #22c55e;
      color: white;
    }

    pre {
      white-space: pre-wrap;
      color: #e2e8f0;
    }

  </style>
</head>

<body>

<div class="wrap">

  <h1>Websites That Make Your Business Look Premium</h1>
  <div class="sub">
    We design high-conversion business websites in 72 hours.
  </div>

  <div class="box">

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="business" placeholder="Business Type">
    <input id="goal" placeholder="Main Goal">

    <button onclick="send()">Generate Website Plan</button>

    <div id="output" style="margin-top:20px;"></div>

  </div>

  <div class="section">

    <h2>Simple Pricing</h2>

    <div class="pricing">

      <div class="price">
        <h3>$199 Setup</h3>
        <p>Custom website built in 72 hours.</p>
        <a class="cta green" href="YOUR_STRIPE_SETUP_LINK">Buy Setup</a>
      </div>

      <div class="price">
        <h3>$49/month Care Plan</h3>
        <p>Hosting, updates, SEO, protection.</p>
        <a class="cta green" href="YOUR_STRIPE_MONTHLY_LINK">Subscribe</a>
      </div>

    </div>

  </div>

</div>

<script>
async function send() {

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    business: document.getElementById("business").value,
    goal: document.getElementById("goal").value
  };

  document.getElementById("output").innerHTML =
    "<p style='color:#38bdf8'>Generating your website plan...</p>";

  const res = await fetch("YOUR_CLOUDFLARE_WORKER_URL", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  const json = await res.json();

  document.getElementById("output").innerHTML =
    "<pre>" + json.headline + "\n\n" +
    json.subheadline + "\n\n" +
    json.services + "\n\n" +
    json.pricing + "\n\n" +
    json.cta + "</pre>";
}
</script>

</body>
</html>
