<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Shelf Websites | AI Business Websites in 72 Hours</title>

<style>
body { font-family: Arial; margin:0; background:#f8fafc; }
header { background:#0a192f; color:white; padding:20px; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:white; padding:20px; margin:20px 0; border-radius:10px; }
button { background:#bd1e24; color:white; padding:12px; border:none; width:100%; cursor:pointer; }
input, select { width:100%; padding:10px; margin:8px 0; }
</style>

</head>
<body>

<header>
  <h1>Top Shelf Websites</h1>
  <p>AI-Powered Websites Delivered in 72 Hours</p>
</header>

<div class="container">

<div class="card">
  <h2>$199 Website Setup</h2>
  <ul>
    <li>4-page business website</li>
    <li>Mobile ready design</li>
    <li>SEO optimized</li>
    <li>Delivered in 72 hours</li>
  </ul>
</div>

<div class="card">
  <h2>Start Your Website</h2>

  <input id="businessName" placeholder="Business Name">
  <input id="email" placeholder="Email">
  <select id="industry">
    <option>Restaurant</option>
    <option>Trades</option>
    <option>Retail</option>
    <option>Services</option>
  </select>

  <button onclick="submitLead()">Get Started</button>

  <div id="msg"></div>
</div>

</div>

<script>
async function submitLead() {
  const msg = document.getElementById("msg");

  const res = await fetch("/functions/submit", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      businessName: document.getElementById("businessName").value,
      email: document.getElementById("email").value,
      industry: document.getElementById("industry").value
    })
  });

  const data = await res.json();

  if(data.success){
    msg.innerHTML = "Success! Redirecting...";
    window.location.href = "/success.html";
  } else {
    msg.innerHTML = "Error submitting form";
  }
}
</script>

</body>
</html>
