<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Shelf Websites Operational Deck</title>
<style>
:root{--primary:#0f172a;--accent:#2563eb;--bg:#f8fafc;--white:#fff}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:#334155}.container{width:90%;max-width:1200px;margin:auto;padding:30px}.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.metric-card{background:white;padding:25px;border-radius:10px;box-shadow:0 4px 12px #0001}.metric-val{font-size:2rem;font-weight:800;color:var(--accent)}table{width:100%;background:white;border-collapse:collapse;margin-top:20px}th,td{padding:14px;border-bottom:1px solid #ddd;text-align:left}.badge{padding:5px 10px;border-radius:5px}.active{background:#dcfce7}.pending{background:#fef3c7}.suspended{background:#fee2e2}.kill-btn{background:#dc2626;color:white;border:0;padding:8px 12px;border-radius:5px}
</style>
</head>
<body>
<div class="container">
<h1>Top Shelf Websites Operational Deck</h1>
<div class="metric-row">
<div class="metric-card"><p>Active Networks</p><div class="metric-val" id="active-count">0</div></div>
<div class="metric-card"><p>Projected Monthly Income</p><div class="metric-val" id="mrr-total">$0.00</div></div>
<div class="metric-card"><p>Sites in 72hr Window</p><div class="metric-val" id="pending-count">0</div></div>
</div>
<h2>Managed Deployment Ecosystem</h2>
<table><thead><tr><th>Domain</th><th>Repository</th><th>Billing</th><th>Status</th><th>Control</th></tr></thead>
<tbody id="inventory-table-body"><tr><td colspan="5">Supabase connection pending</td></tr></tbody>
</table>
</div>
<script src="/js/dashboard.js" defer></script>
</body>
</html>
