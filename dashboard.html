<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{font-family:Arial;background:#f1f5f9;padding:20px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px;}
</style>
</head>
<body>

<h1>Customer Leads</h1>
<button onclick="load()">Refresh</button>

<div id="leads"></div>

<script>
async function load(){
  const res = await fetch("/functions/leads");
  const data = await res.json();

  const box = document.getElementById("leads");
  box.innerHTML = data.leads.map(l => `
    <div class="card">
      <b>${l.businessName}</b><br>
      ${l.email}<br>
      ${l.industry}<br>
      ${l.createdAt}
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
